[web]
host = "0.0.0.0"
port = 8080
browser_fps = 1
auto_start_slots = true
ssl_certfile = "/opt/steam-shared/cs2-transformer-agent/inference/certs/dev-cert.pem"
ssl_keyfile = "/opt/steam-shared/cs2-transformer-agent/inference/certs/dev-key.pem"

[recording]
output_dir = "./recordings"
composite_fps = 10
codec = "h264_nvenc"
crf = 23

[runtime]
runas_path = "/usr/local/bin/runas"
discovery_timeout_s = 20.0
discovery_poll_interval_s = 0.25
restart_backoff_s = 2.0

[server]
enabled = true
user = "server"
tmux_session = "cs2-ds"
start_command = ["./inference/server/start_server.sh"]
scenario_config_path = "/home/server/steam-lib/steamapps/common/Counter-Strike Global Offensive/game/csgo/addons/counterstrikesharp/plugins/Cs2SimHarness/cs2-sim-harness.json"
plugin_state_path = "/home/server/steam-lib/steamapps/common/Counter-Strike Global Offensive/game/csgo/addons/counterstrikesharp/plugins/Cs2SimHarness/cs2-sim-state.json"
connect_address = "127.0.0.1:27015"
console_toggle_key = "grave"
console_toggle_with_shift = false
connect_command_template = "connect {address}"
connect_submit_key = "enter"
console_close_key = "esc"
pause_command = "css_sim_freeze"
resume_command = "css_sim_unfreeze"
connect_open_delay_s = 0.2
connect_keystroke_delay_s = 0.012
connect_post_enter_delay_s = 0.75
plugin_state_refresh_delay_s = 0.15
log_lines = 200

[[slots]]
name = "steam1"
user = "steam1"
tmux_session = "cs2-steam1"
launch_command = ["steam", "-silent", "-nofriendsui", "-applaunch", "730"]
gamescope_args = ["--backend", "headless"]
width = 640
height = 480
capture_fps = 30
jpeg_quality = 80
video_port = 5500
input_port = 5501
audio_port = 5502
audio_sample_rate = 24000
audio_channels = 2
audio_frame_hz = 32
audio_monitor_name = "auto_null.monitor"
inspect_fps = 1
startup_grace_s = 2.0

