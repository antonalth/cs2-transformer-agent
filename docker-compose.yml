services:
  dev:
    image: nvcr.io/nvidia/pytorch:25.06-py3
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - pip-cache:/root/.cache/pip

      # 🔽 persist model caches on the host
      - ./cache/hf:/workspace/.cache/huggingface
      - ./cache/torch:/workspace/.cache/torch
      - ./cache/datasets:/workspace/.cache/huggingface/datasets
      # (optional) keep your HF auth files outside the repo:
      # - ~/.huggingface:/root/.huggingface:ro

    stdin_open: true
    tty: true
    ipc: host
    shm_size: "16gb"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

      # 🔽 tell libs where to cache
      - HF_HOME=/workspace/.cache/huggingface
      - TRANSFORMERS_CACHE=/workspace/.cache/huggingface/transformers
      - HUGGINGFACE_HUB_CACHE=/workspace/.cache/huggingface/hub
      - HF_DATASETS_CACHE=/workspace/.cache/huggingface/datasets
      - TORCH_HOME=/workspace/.cache/torch  # used by timm & torch.hub

    gpus: all
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "python -m pip install --upgrade pip setuptools wheel &&
       if [ -f requirements.txt ]; then pip install -r requirements.txt; fi &&
       echo '✅ Environment ready. Caches are mounted.' &&
       exec bash"

volumes:
  pip-cache:
