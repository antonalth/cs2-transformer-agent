version: "3.8"

services:
  dev:
    image: nvcr.io/nvidia/pytorch:25.06-py3
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - pip-cache:/root/.cache/pip
    stdin_open: true   # keeps STDIN open (so you get an interactive prompt)
    tty: true          # allocate a TTY
    ipc: host          # recommended for PyTorch dataloaders
    shm_size: "16gb"   # optional: increase shared memory (adjust as needed)
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    # If you're on modern Docker Compose, this requests GPUs from the NVIDIA driver.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
    command: >
      bash -lc "
        python -m pip install --upgrade pip setuptools wheel &&
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi &&
        echo -e '\n✅ Environment ready. You are now inside the NGC PyTorch container.' &&
        exec bash
      "

volumes:
  pip-cache:
